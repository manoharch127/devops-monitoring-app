<!DOCTYPE html>
<html>
<head>
    <title>CloudOps Dashboard</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        .status {
            color: #22c55e;
            font-weight: bold;
        }

        .button {
            margin-top: 40px;
            text-align: center;
        }

        button {
            background: #ef4444;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #dc2626;
        }
    </style>
</head>
<body>

<h1>CloudOps Health Monitoring Dashboard</h1>

<div class="container">

    <div class="card">
        <h2>Application Status</h2>
        <p class="status">{{ status }}</p>
    </div>

    <div class="card">
        <h2>Hostname</h2>
        <p>{{ hostname }}</p>
    </div>

    <div class="card">
        <h2>CPU Usage</h2>
        <p>{{ cpu }}%</p>
    </div>

    <div class="card">
        <h2>Memory Usage</h2>
        <p>{{ memory }}%</p>
    </div>

    <div class="card">
        <h2>Uptime</h2>
        <p>{{ uptime }} seconds</p>
    </div>

    <div class="card">
        <h2>Deployment Version</h2>
        <p>{{ version }}</p>
    </div>

</div>

<div class="button">
    <form action="/simulate-incident">
        <button type="submit">Simulate Incident</button>
    </form>
</div>

</body>
</html>
